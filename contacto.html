<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEATHFISH | Contacto</title>
    <style>
        /* --- PERSONALIZACIÓN GLOBAL --- */
        html, body {
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Courier New', Courier, monospace;
            /* Cursor Clásico en Color Rojo */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="red"><path d="M7 2l12 11.2-5.8.8 3.3 6.5-2.2 1.3-3.3-6.5-4 3.7V2z"/></svg>'), auto;
            background-color: #000;
            color: #fff;
            text-align: center; 
            min-height: 100vh;
        }

        /* Scrollbar Roja Minimalista */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff0000;
        }

        /* --- ESTILOS BASE --- */
        body { 
            background-image: url('assets/fondo1.JPG'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.6); 
            min-height: 100vh;
            width: 100%;
            padding-bottom: 50px;
        }

        header { padding: 40px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        .logo { font-size: 3.5rem; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; }
        
        /* Navegación limpia sin subrayado */
        nav ul { display: flex; justify-content: center; list-style: none; border-top: 1px solid rgba(255, 255, 255, 0.2); border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 0; }
        nav li:not(:last-child)::after { content: "|"; margin: 0 15px; color: #888; }
        nav a { 
            text-decoration: none; 
            color: #fff; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            font-weight: bold; 
            transition: color 0.3s ease;
        }
        nav a:hover { color: #ff0000; text-decoration: none; }

        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }

        .section-title {
            font-size: 3rem;
            text-transform: uppercase;
            margin: 40px 0;
            font-style: italic;
            border-bottom: 2px solid #fff;
            display: inline-block;
        }

        /* --- ESTILOS DEL FORMULARIO --- */
        .contact-form {
            background: rgba(0, 0, 0, 0.5);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
            margin-top: 20px;
            /* Efecto expansión igual que Archivo y Merch */
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), border-color 0.3s;
        }

        .contact-form:hover {
            border-color: rgba(255, 0, 0, 0.5);
            transform: scale(1.02);
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
            color: #888;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ff0000; /* Letras rojas al escribir */
            caret-color: #ff0000; /* Cursor rojo */
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 0, 0, 0.3);
        }

        input:focus, textarea:focus {
            border-color: #ff0000;
            background: rgba(255, 0, 0, 0.05);
        }

        .submit-btn {
            background: transparent;
            color: #ff0000;
            border: 2px solid #ff0000;
            padding: 15px 40px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            background: #ff0000;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        /* --- FOOTER --- */
        footer { border-top: 1px solid rgba(255, 255, 255, 0.1); padding: 50px 20px; background: rgba(0,0,0,0.85); margin-top: 50px; }
        .social-icons { display: flex; justify-content: center; gap: 40px; margin: 25px 0; }
        .social-icons img { width: 32px; filter: invert(1); transition: 0.3s; }
        .social-icons a:hover img { 
            filter: invert(0.2) sepia(1) saturate(10) hue-rotate(-45deg); 
            transform: scale(1.2); 
        }
        .footer-credits { font-size: 0.85rem; color: #888; letter-spacing: 1px; margin-top: 20px; }

        @media (max-width: 480px) {
            .logo { font-size: 2rem; }
            .section-title { font-size: 2rem; }
            .contact-form { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <header>
            <div class="logo">DEATHFISH</div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="merch.html">Merch</a></li>
                    <li><a href="archivo.html">Archivo</a></li>
                    <li><a href="stream.html">Stream</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </header>

        <div class="container">
            <h2 class="section-title">Contacto</h2>
            
            <p style="margin-bottom: 30px; font-style: italic; color: #ccc;">Para contrataciones, prensa o dudas sobre la merch.</p>

            <form class="contact-form">
                <div class="form-group">
                    <label>Nombre / Organización</label>
                    <input type="text" placeholder="EJ. PECERA RECORDS" required>
                </div>

                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="TU@EMAIL.COM" required>
                </div>

                <div class="form-group">
                    <label>Asunto</label>
                    <input type="text" placeholder="EJ. CONTRATACIÓN EVENTO">
                </div>

                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea rows="6" placeholder="ESCRIBE TU MENSAJE AQUÍ..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Enviar Mensaje</button>
            </form>
        </div>

        <footer>
            <p style="letter-spacing: 2px;">CONECTA CON LA PECERA</p>
            <div class="social-icons">
                <a href="https://www.youtube.com/@deathfish-band" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube"></a>
                <a href="https://www.instagram.com/deathfishband/" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png" alt="Instagram"></a>
                <a href="https://deathfishband.bandcamp.com/" target="_blank"><img src="https://s4.bcbits.com/vite/corp-pages/client/v1/es/assets/bandcamp-button-bc-circle-black-512-DRFTsOMy.png" alt="Bandcamp"></a>
            </div>
            <p class="footer-credits">© 2026 DEATHFISH - LA PECERA RECORDS</p>
        </footer>
    </div>
</body>
</html>
