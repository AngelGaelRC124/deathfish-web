<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEATHFISH | Merch</title>
    <style>
        /* Estilos Base Heredados de Inicio */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body { 
            background-image: url('assets/fondo1.JPG'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center;
            color: #fff; 
            text-align: center; 
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.6); 
            min-height: 100vh;
            width: 100%;
        }

        header { padding: 40px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        .logo { font-size: 3.5rem; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; }
        
        nav ul { display: flex; justify-content: center; list-style: none; border-top: 1px solid rgba(255, 255, 255, 0.2); border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 0; }
        nav li { display: flex; align-items: center; }
        nav li:not(:last-child)::after { content: "|"; margin: 0 15px; color: #888; }
        nav a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 0.9rem; font-weight: bold; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Título de la Sección */
        .section-title {
            font-size: 3rem;
            text-transform: uppercase;
            margin: 40px 0;
            font-style: italic;
            border-bottom: 2px solid #fff;
            display: inline-block;
        }

        /* Grid de Merch */
        .merch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding-bottom: 60px;
        }

        .product-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: scale(1.02);
            border-color: #ff0000;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .product-info p {
            font-size: 1.2rem;
            color: #ff0000;
            font-weight: bold;
        }

        .buy-button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #fff;
            color: #000;
            border: none;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .buy-button:hover {
            background: #ff0000;
            color: #fff;
        }

        @media (max-width: 480px) {
            .logo { font-size: 2rem; }
            .section-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <header>
            <div class="logo">DEATHFISH</div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="merch.html">Merch</a></li>
                    <li><a href="archivo.html">Archivo</a></li>
                    <li><a href="stream.html">Stream</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </header>

        <div class="container">
            <h2 class="section-title">Merchandise</h2>

            <div class="merch-grid">
                <!-- Producto 1 -->
                <div class="product-card">
                    <div class="product-image">
                        <img src="assets/deathfish-mexiac.JPG" alt="Placeholder Merch">
                    </div>
                    <div class="product-info">
                        <h3>Playera Oficial</h3>
                        <p>$350.00 MXN</p>
                        <button class="buy-button">Comprar</button>
                    </div>
                </div>

                <!-- Producto 2 -->
                <div class="product-card">
                    <div class="product-image">
                        <img src="assets/deathfish-mexiac.JPG" alt="Placeholder Merch">
                    </div>
                    <div class="product-info">
                        <h3>Vinyl Deathfish</h3>
                        <p>$600.00 MXN</p>
                        <button class="buy-button">Comprar</button>
                    </div>
                </div>

                <!-- Producto 3 -->
                <div class="product-card">
                    <div class="product-image">
                        <img src="assets/deathfish-mexiac.JPG" alt="Placeholder Merch">
                    </div>
                    <div class="product-info">
                        <h3>Gorra Negra</h3>
                        <p>$250.00 MXN</p>
                        <button class="buy-button">Comprar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
