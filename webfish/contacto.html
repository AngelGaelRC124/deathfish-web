<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEATHFISH | Contacto</title>
    <style>
        /* Estilos Base Heredados */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body { 
            background-image: url('assets/fondo1.JPG'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center;
            color: #fff; 
            text-align: center; 
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.6); 
            min-height: 100vh;
            width: 100%;
            padding-bottom: 100px; /* Espacio para que el diseño respire al final */
        }

        header { padding: 40px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        .logo { font-size: 3.5rem; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; }
        
        nav ul { display: flex; justify-content: center; list-style: none; border-top: 1px solid rgba(255, 255, 255, 0.2); border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 0; }
        nav li { display: flex; align-items: center; }
        nav li:not(:last-child)::after { content: "|"; margin: 0 15px; color: #888; }
        nav a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 0.9rem; font-weight: bold; }

        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }

        .section-title {
            font-size: 3rem;
            text-transform: uppercase;
            margin: 40px 0;
            font-style: italic;
            border-bottom: 2px solid #fff;
            display: inline-block;
        }

        /* Estilos del Formulario */
        .contact-form {
            background: rgba(0, 0, 0, 0.5);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
            margin-top: 20px;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #ff0000;
        }

        .submit-btn {
            background: transparent;
            color: #ff0000;
            border: 2px solid #ff0000;
            padding: 15px 40px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            background: #ff0000;
            color: #fff;
        }

        @media (max-width: 480px) {
            .logo { font-size: 2rem; }
            .section-title { font-size: 2rem; }
            .contact-form { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <header>
            <div class="logo">DEATHFISH</div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="merch.html">Merch</a></li>
                    <li><a href="archivo.html">Archivo</a></li>
                    <li><a href="stream.html">Stream</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </header>

        <div class="container">
            <h2 class="section-title">Contacto</h2>
            
            <p style="margin-bottom: 30px; font-style: italic;">Para contrataciones, prensa o dudas sobre la merch.</p>

            <form class="contact-form">
                <div class="form-group">
                    <label>Nombre / Organización</label>
                    <input type="text" placeholder="EJ. PECERA RECORDS" required>
                </div>

                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="TU@EMAIL.COM" required>
                </div>

                <div class="form-group">
                    <label>Asunto</label>
                    <input type="text" placeholder="EJ. CONTRATACIÓN EVENTO">
                </div>

                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea rows="6" placeholder="ESCRIBE TU MENSAJE AQUÍ..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Enviar Mensaje</button>
            </form>
        </div>
    </div>
</body>
</html>
