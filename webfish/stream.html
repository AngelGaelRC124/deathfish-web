<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEATHFISH | Stream</title>
    <style>
        /* Estilos Base Heredados */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body { 
            background-image: url('assets/fondo1.JPG'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center;
            color: #fff; 
            text-align: center; 
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.6); 
            min-height: 100vh;
            width: 100%;
            /* Añadimos un espacio al final de la capa oscura */
            padding-bottom: 100px; 
        }

        header { padding: 40px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        .logo { font-size: 3.5rem; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; }
        
        nav ul { display: flex; justify-content: center; list-style: none; border-top: 1px solid rgba(255, 255, 255, 0.2); border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 0; }
        nav li { display: flex; align-items: center; }
        nav li:not(:last-child)::after { content: "|"; margin: 0 15px; color: #888; }
        nav a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 0.9rem; font-weight: bold; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        .section-title {
            font-size: 3rem;
            text-transform: uppercase;
            margin: 40px 0;
            font-style: italic;
            border-bottom: 2px solid #fff;
            display: inline-block;
        }

        /* Contenedor visual del Video */
        .video-link-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            overflow: hidden;
            background: #000;
            display: block;
        }

        .video-thumbnail {
            width: 100%;
            display: block;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .video-link-container:hover .video-thumbnail {
            opacity: 1;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: white;
            transition: background 0.3s;
        }

        .video-link-container:hover .play-button {
            background: #ff0000;
        }

        .channel-link {
            display: inline-block;
            margin-top: 20px;
            margin-bottom: 50px; /* Margen extra para que no pegue abajo */
            padding: 15px 30px;
            border: 2px solid #ff0000;
            color: #ff0000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .channel-link:hover {
            background: #ff0000;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <header>
            <div class="logo">DEATHFISH</div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="merch.html">Merch</a></li>
                    <li><a href="archivo.html">Archivo</a></li>
                    <li><a href="stream.html">Stream</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </header>

        <div class="container">
            <h2 class="section-title">Stream / Video</h2>

            <p style="margin-bottom: 20px; font-style: italic; letter-spacing: 1px;">HAZ CLIC PARA VER EL VIDEO OFICIAL</p>
            
            <a href="https://www.youtube.com/watch?v=ZDr03UqGoTw" target="_blank" class="video-link-container">
                <img src="https://img.youtube.com/vi/ZDr03UqGoTw/maxresdefault.jpg" alt="DEATHFISH Video Preview" class="video-thumbnail">
                <div class="play-button">▶</div>
            </a>

            <br>
            <a href="https://www.youtube.com/@deathfish-band" target="_blank" class="channel-link">
                IR AL CANAL DE YOUTUBE
            </a>
        </div>
    </div>
</body>
</html>
