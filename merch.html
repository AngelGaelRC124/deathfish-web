<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEATHFISH | Merch</title>
    <style>
        /* Estilos Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body { 
            background-image: url('assets/fondo1.JPG'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center;
            color: #fff; 
            text-align: center; 
            min-height: 100vh;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.6); 
            min-height: 100vh;
            width: 100%;
            padding-bottom: 100px;
        }

        /* HEADER Y NAVEGACIÓN PRINCIPAL */
        header { padding: 40px 20px 0 20px; }
        .logo { font-size: 3.5rem; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; }
        
        nav ul { display: flex; justify-content: center; list-style: none; border-top: 1px solid rgba(255, 255, 255, 0.2); border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 0; }
        nav li:not(:last-child)::after { content: "|"; margin: 0 15px; color: #888; }
        nav a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 0.9rem; font-weight: bold; }

        /* BARRA DE SUB-PESTAÑAS (Categorías) */
        .sub-nav {
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .filter-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 5px 15px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #ff0000;
            border-color: #ff0000;
        }

        /* SECCIÓN DE BÚSQUEDA */
        .search-section {
            margin-bottom: 40px;
        }

        #merch-search {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #fff;
            color: #fff;
            padding: 12px 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        #merch-search:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        /* GRID DE PRODUCTOS (CORREGIDO CON AUTO-FILL) */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .merch-grid {
            display: grid;
            /* auto-fill evita que los cuadros se estiren cuando hay pocos */
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        .product-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            transition: transform 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-card:hover { 
            border-color: #ff0000; 
            transform: translateY(-8px); 
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-card h3 { 
            font-size: 0.9rem; 
            margin-bottom: 10px; 
            letter-spacing: 1px;
            height: 40px; /* Asegura alineación si el título es largo */
            display: flex;
            align-items: center;
        }

        .product-card p { 
            color: #ff0000; 
            font-weight: bold; 
            font-size: 1.1rem;
        }

        /* Mensaje cuando no hay resultados */
        #no-results {
            display: none;
            margin-top: 50px;
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <header>
            <div class="logo">DEATHFISH</div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="merch.html">Merch</a></li>
                    <li><a href="archivo.html">Archivo</a></li>
                    <li><a href="stream.html">Stream</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </header>

        <div class="sub-nav">
            <button class="filter-btn active" onclick="filterCategory('todos', this)">Todos</button>
            <button class="filter-btn" onclick="filterCategory('ropa', this)">Ropa</button>
            <button class="filter-btn" onclick="filterCategory('discos', this)">Discos</button>
            <button class="filter-btn" onclick="filterCategory('souvenirs', this)">Souvenirs</button>
        </div>

        <div class="container">
            <div class="search-section">
                <input type="text" id="merch-search" placeholder="ESCRIBE PARA BUSCAR..." onkeyup="searchMerch()">
            </div>

            <div class="merch-grid" id="merch-container">
                
                <div class="product-card" data-category="ropa" data-name="playera gdb">
                    <img src="assets/acuario-2.JPG" class="product-img">
                    <h3>PLAYERA GDB 2026</h3>
                    <p>$350 MXN</p>
                </div>

                <div class="product-card" data-category="discos" data-name="cd limerence">
                    <img src="assets/poster-1.jpg" class="product-img">
                    <h3>CD LIMERENCE (ED. ESPECIAL)</h3>
                    <p>$200 MXN</p>
                </div>

                <div class="product-card" data-category="souvenirs" data-name="sticker pack">
                    <img src="assets/deathfish-acuario.JPG" class="product-img">
                    <h3>STICKER PACK "PECERA"</h3>
                    <p>$50 MXN</p>
                </div>

                <div class="product-card" data-category="ropa" data-name="hoodie logo">
                    <img src="assets/acuario-4.JPG" class="product-img">
                    <h3>HOODIE DEATHFISH LOGO</h3>
                    <p>$600 MXN</p>
                </div>

                <div class="product-card" data-category="discos" data-name="vinilo espuma">
                    <img src="assets/poster-2.PNG" class="product-img">
                    <h3>VINILO "ESPUMA" (WHITE LBL)</h3>
                    <p>$450 MXN</p>
                </div>

            </div>

            <div id="no-results">NO SE ENCONTRARON PRODUCTOS RELACIONADOS...</div>
        </div>
    </div>

    <script>
        // FUNCIÓN PARA FILTRAR POR CATEGORÍA
        function filterCategory(category, btn) {
            const products = document.querySelectorAll('.product-card');
            const buttons = document.querySelectorAll('.filter-btn');

            // Actualizar botones
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Filtrar productos
            products.forEach(product => {
                const prodCat = product.getAttribute('data-category');
                if (category === 'todos' || prodCat === category) {
                    product.style.display = 'flex';
                } else {
                    product.style.display = 'none';
                }
            });
        }

        // FUNCIÓN PARA BUSCADOR EN TIEMPO REAL
        function searchMerch() {
            const input = document.getElementById('merch-search').value.toLowerCase();
            const products = document.querySelectorAll('.product-card');
            const noResults = document.getElementById('no-results');
            let visibleCount = 0;

            products.forEach(product => {
                const name = product.getAttribute('data-name');
                if (name.includes(input)) {
                    product.style.display = 'flex';
                    visibleCount++;
                } else {
                    product.style.display = 'none';
                }
            });

            // Mostrar mensaje si no hay resultados
            noResults.style.display = (visibleCount === 0) ? 'block' : 'none';
        }
    </script>
</body>
</html>
