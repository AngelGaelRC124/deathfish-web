<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEATHFISH | Archivo</title>
    <style>
        /* --- PERSONALIZACIÓN GLOBAL (Coherente con Inicio) --- */
        html, body {
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Courier New', Courier, monospace;
            /* Cursor Clásico en Color Rojo */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="red"><path d="M7 2l12 11.2-5.8.8 3.3 6.5-2.2 1.3-3.3-6.5-4 3.7V2z"/></svg>'), auto;
            background-color: #000;
            color: #fff;
            text-align: center; 
            min-height: 100vh;
        }

        /* Scrollbar Roja Minimalista */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff0000;
        }

        /* --- ESTILOS BASE --- */
        body { 
            background-image: url('assets/fondo1.JPG'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.6); 
            min-height: 100vh;
            width: 100%;
            padding-bottom: 100px;
            transition: all 0.5s ease;
        }

        .blur-effect { 
            filter: blur(8px); 
            background-color: rgba(0, 0, 0, 0.9); 
        }

        header { padding: 40px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        .logo { font-size: 3.5rem; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; }
        
        /* Navegación limpia sin subrayado */
        nav ul { display: flex; justify-content: center; list-style: none; border-top: 1px solid rgba(255, 255, 255, 0.2); border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 0; }
        nav li:not(:last-child)::after { content: "|"; margin: 0 15px; color: #888; }
        nav a { 
            text-decoration: none; 
            color: #fff; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            font-weight: bold; 
            transition: color 0.3s ease;
        }
        nav a:hover { 
            color: #ff0000; 
            text-decoration: none; 
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .section-title { font-size: 3rem; text-transform: uppercase; margin: 40px 0; font-style: italic; border-bottom: 2px solid #fff; display: inline-block; }

        /* Grid de Carpetas */
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .folder-card { cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2); padding: 15px; background: rgba(0, 0, 0, 0.4); transition: 0.3s; }
        .folder-card:hover { transform: scale(1.03); border-color: #ff0000; }
        .folder-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; margin-bottom: 15px; }

        /* Visor de Imágenes (Lightbox) */
        .lightbox {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); /* Ajustado a la opacidad que pediste en inicio */
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .lightbox-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* DISEÑO DEL CONTADOR */
        .img-counter {
            background: rgba(255, 0, 0, 0.8);
            color: #fff;
            padding: 5px 15px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-radius: 2px;
            letter-spacing: 2px;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 75vh;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transition: opacity 0.3s ease;
        }

        .close-btn {
            position: absolute;
            top: -50px; right: 0;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-btn:hover { color: #ff0000; }

        /* BOTONES DE NAVEGACIÓN */
        .nav-btn {
            position: absolute;
            top: 55%;
            transform: translateY(-50%);
            background: rgba(15, 15, 15, 0.7);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 25px;
            cursor: pointer;
            font-size: 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10000;
        }

        .nav-btn:hover { 
            background: #ff0000; 
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        .prev { left: -100px; }
        .next { right: -100px; }

        /* FOOTER Y REDES SOCIALES */
        footer { border-top: 1px solid rgba(255, 255, 255, 0.1); padding: 50px 20px; background: rgba(0,0,0,0.85); margin-top: 50px;}
        .social-icons { display: flex; justify-content: center; gap: 40px; margin: 25px 0; }
        
        .social-icons img { 
            width: 32px; 
            filter: invert(1); 
            transition: 0.3s; 
        }
        
        .social-icons a:hover img { 
            filter: invert(0.2) sepia(1) saturate(10) hue-rotate(-45deg); 
            transform: scale(1.2); 
        }

        .footer-credits { 
            font-size: 0.85rem; 
            color: #888; 
            letter-spacing: 1px; 
            margin-top: 20px; 
        }

        @media (max-width: 1200px) {
            .prev { left: 10px; }
            .next { right: 10px; }
            .nav-btn { padding: 10px 15px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="bg-overlay">
        <header>
            <div class="logo">DEATHFISH</div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="merch.html">Merch</a></li>
                    <li><a href="archivo.html">Archivo</a></li>
                    <li><a href="stream.html">Stream</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </header>

        <div class="container">
            <h2 class="section-title">Archivo</h2>

            <div class="archive-grid">
                <div class="folder-card" onclick="openGallery(0)">
                    <img src="assets/deathfish-banner.JPG" class="folder-thumb">
                    <h3>GDB</h3>
                    <p>15 OCTUBRE 2026</p>
                </div>
                <div class="folder-card" onclick="openGallery(1)">
                    <img src="assets/deathfish-acuario.JPG" class="folder-thumb">
                    <h3>ACUARIO</h3>
                    <p>20 NOVIEMBRE 2026</p>
                </div>
                <div class="folder-card" onclick="openGallery(2)">
                    <img src="assets/live-pecera.JPG" class="folder-thumb">
                    <h3>LIVE SESSION</h3>
                    <p>05 DICIEMBRE 2026</p>
                </div>
            </div>
        </div>

        <footer>
            <p style="letter-spacing: 2px;">CONECTA CON LA PECERA</p>
            <div class="social-icons">
                <a href="https://www.youtube.com/@deathfish-band" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube"></a>
                <a href="https://www.instagram.com/deathfishband/" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png" alt="Instagram"></a>
                <a href="https://deathfishband.bandcamp.com/" target="_blank"><img src="https://s4.bcbits.com/vite/corp-pages/client/v1/es/assets/bandcamp-button-bc-circle-black-512-DRFTsOMy.png" alt="Bandcamp"></a>
            </div>
            <p class="footer-credits">© 2026 DEATHFISH - LA PECERA RECORDS</p>
        </footer>
    </div>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <div id="img-counter" class="img-counter">1/1</div>
            
            <span class="close-btn" onclick="closeGallery()">&times;</span>
            <button class="nav-btn prev" onclick="changeImg(-1)">&lt;</button>
            <img src="" id="active-img" class="lightbox-img">
            <button class="nav-btn next" onclick="changeImg(1)">&gt;</button>
        </div>
    </div>

    <script>
        const galleries = [
            ["assets/deathfish-banner.JPG", "assets/deathfish-mexiac.JPG", "assets/poster-1.jpg", "assets/poster-2.PNG", "assets/poster-3.PNG", "assets/poster-4.PNG", "assets/poster-5.PNG", "assets/poster-6.PNG"],
            ["assets/deathfish-acuario.JPG", "assets/acuario-1.JPG", "assets/acuario-2.JPG", "assets/acuario-3.JPG", "assets/acuario-4.JPG", "assets/acuario-5.JPG", "assets/acuario-6.JPG", "assets/acuario-7.JPG", "assets/acuario-8.JPG", "assets/acuario-9.JPG", "assets/acuario-10.JPG"],
            ["assets/live-pecera.JPG", "assets/deathfish-mexiac.JPG"]
        ];

        let currentGal = 0;
        let currentIdx = 0;

        function updateDisplay() {
            const imgElement = document.getElementById('active-img');
            const counterElement = document.getElementById('img-counter');
            imgElement.style.opacity = 0;
            setTimeout(() => {
                imgElement.src = galleries[currentGal][currentIdx];
                counterElement.innerHTML = `${currentIdx + 1} / ${galleries[currentGal].length}`;
                imgElement.style.opacity = 1;
            }, 150);
        }

        function openGallery(id) {
            currentGal = id;
            currentIdx = 0;
            updateDisplay();
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('bg-overlay').classList.add('blur-effect');
        }

        function closeGallery() {
            document.getElementById('lightbox').style.display = 'none';
            document.getElementById('bg-overlay').classList.remove('blur-effect');
        }

        function changeImg(step) {
            currentIdx += step;
            if (currentIdx >= galleries[currentGal].length) currentIdx = 0;
            if (currentIdx < 0) currentIdx = galleries[currentGal].length - 1;
            updateDisplay();
        }

        window.onclick = function(event) {
            const lb = document.getElementById('lightbox');
            if (event.target == lb) closeGallery();
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === "ArrowRight") changeImg(1);
                if (e.key === "ArrowLeft") changeImg(-1);
                if (e.key === "Escape") closeGallery();
            }
        });
    </script>
</body>
</html>
